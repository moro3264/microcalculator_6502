MEMORY {
    ZEROPAGE:   
        start   =   $0000
        size    =   $0100
        type    =   RW;

    RAM1:
        start   =   $0100
        size    =   $7F00
        type    =   RW;

    ROM1:
        start   =   $8000
        size    =   $8000
        type    =   RO
        file    =   %O;
}

SEGMENTS {
    ZEROPAGE:  
        load    =   ZEROPAGE
        type    =   ZP;
    CODE:
        load    =   ROM1
        type    =   RO
        start   =   $8040;
    DATA:
        load    =   ROM1
        type    =   ro;
    RODATA:
        load    =   ROM1
        type    =   ro;
    BSS:
        load    =   RAM1
        type    =   rw;
    VECTORI:   
        load    =   ROM1
        type    =   ro
        start   =   $FFFA;
}
