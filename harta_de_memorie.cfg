MEMORY {
    RAM:
        start   =   $0000
        size    =   $8000
        type    =   RW
        file    =   %O;

    ROM:
        start   =   $8000
        size    =   $8000
        type    =   RO
        file    =   "bin/firmware.bin";

    ROM_TEST:
        start   =   $0000
        size    =   $5000
        type    =   RW
        file    =   "bin/rom_test.bin";
}

SEGMENTS {
    CODE:
        load    =   ROM
        type    =   RO
        start   =   $8040;
    RODATA:
        load    =   ROM
        type    =   RO;
    DATA:
        load    =   RAM
        type    =   RW;
    BSS:
        load    =   RAM
        type    =   RW;
    VEC:   
        load    =   ROM
        type    =   RO
        start   =   $FFFA;

    ROM_TEST:
        load    =   ROM_TEST
        type    =   RW
        start   =   $0000;
}
